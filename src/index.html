<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地文件页数统计工具 华印首发</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/mammoth@1.4.18/bundled/mammoth.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
        }

        body {
            background: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            color: #ffffff;
            font-weight: 600;
        }

        /* ============ */
        .reward-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #1a1a1a;
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #ffd700;
            cursor: pointer;
            z-index: 998;
            box-shadow: 0 6px 16px rgba(255, 215, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .reward-btn:hover {
            background: #ffd700;
            color: #000;
            transform: translateY(-3px) scale(1.08);
            box-shadow: 0 10px 24px rgba(255, 215, 0, 0.25);
        }
        .reward-btn:active {
            transform: translateY(0);
        }

        /* 赞赏弹窗 */
        .reward-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: zoom-out;
            animation: fadeIn 0.3s ease;
        }
        .reward-modal.show {
            display: flex;
        }
        .reward-img {
            max-width: 80%;
            max-height: 80vh;
            border-radius: 16px;
            border: 3px solid #fff;
            box-shadow: 0 0 40px rgba(255,255,255,0.2);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .drop-area {
            border: 3px dashed #4fc3f7;
            border-radius: 16px;
            padding: 4rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
            cursor: pointer;
        }
        .drop-area:hover {
            border-color: #03a9f4;
            background: rgba(79, 195, 247, 0.1);
        }
        .drop-area.active {
            border-color: #00e676;
            background: rgba(0, 230, 118, 0.1);
        }
        .drop-icon {
            font-size: 3rem;
            color: #4fc3f7;
            margin-bottom: 1rem;
        }
        .drop-text {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: #bdbdbd;
        }
        .drop-subtext {
            font-size: 0.9rem;
            color: #757575;
        }

        .stats-panel {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-card {
            background: #1e1e1e;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            min-width: 180px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4fc3f7;
            margin-bottom: 0.3rem;
        }
        .stat-label {
            font-size: 0.9rem;
            color: #9e9e9e;
        }

        .file-list {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .file-header {
            display: grid;
            grid-template-columns: 1fr 120px 120px 100px;
            padding: 1rem 1.5rem;
            background: #252525;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
        }
        .file-header > div:first-child { text-align: left; }
        .file-item {
            display: grid;
            grid-template-columns: 1fr 120px 120px 100px;
            padding: 1rem 1.5rem;
            align-items: center;
            border-bottom: 1px solid #333;
            transition: background 0.2s;
            text-align: center;
        }
        .file-item:hover {
            background: #252525;
        }
        .file-name {
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 1rem;
        }
        .file-type {
            text-align: center;
            color: #ffab40;
            font-weight: 600;
        }
        .file-pages {
            text-align: center;
            color: #00e676;
            font-weight: 600;
        }
        .delete-btn {
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
            margin: 0 auto;
            display: block;
        }
        .delete-btn:hover {
            background: #ff1744;
        }

        .float-btn {
            position: fixed;
            right: 30px;
            bottom: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ff5252;
            color: white;
            font-size: 24px;
            border: none;
            box-shadow: 0 4px 15px rgba(255,82,82,0.4);
            cursor: move;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .float-btn:hover {
            background: #ff1744;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        .clear-btn {
            background: #616161;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .clear-btn:hover {
            background: #424242;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #616161;
            font-size: 1rem;
        }

        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #757575;
            line-height: 1.6;
        }
        .footer a {
            color: #4fc3f7;
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer a:hover {
            color: #03a9f4;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- 按钮 -->
    <button class="reward-btn" id="rewardBtn">赏</button>
    <!-- 弹窗 -->
    <div class="reward-modal" id="rewardModal">
        <img src="mm_r.png" class="reward-img" alt="赞赏码">
    </div>

    <div class="container">
        <h1 class="title">本地文件页数统计工具</h1>
        <div class="drop-area" id="dropArea">
            <div class="drop-icon">📁</div>
            <div class="drop-text">拖拽文件到此处</div>
            <div class="drop-subtext">支持 PDF/DOCX/DOC/PPT/PPTX/TXT/XLS/XLSX，完全离线解析</div>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="fileCount">0</div>
                <div class="stat-label">已上传文件</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPages">0</div>
                <div class="stat-label">总页数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="parseTime">0.00</div>
                <div class="stat-label">解析用时</div>
            </div>
        </div>

        <div class="file-list">
            <div class="file-header">
                <div>文件名</div>
                <div>文件类型</div>
                <div>页数</div>
                <div>操作</div>
            </div>
            <div id="fileListContainer">
                <div class="empty-state">暂无文件，请拖拽上传</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="clear-btn" id="clearAllBtn">清空所有文件</button>
        </div>

        <div class="footer">
            版权所有 © 清风寇明月｜版本号 v1.1（2026.3）<br>
            <a href="https://www.baidu.cn" target="_blank">访问主页</a>
        </div>
    </div>

    <button class="float-btn" id="floatClearBtn" title="拖动移动位置">🗑️</button>

    <script>
        let fileList = [];
        let totalParseTime = 0;
        const dropArea = document.getElementById('dropArea');
        const fileListContainer = document.getElementById('fileListContainer');
        const fileCountEl = document.getElementById('fileCount');
        const totalPagesEl = document.getElementById('totalPages');
        const parseTimeEl = document.getElementById('parseTime');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const floatClearBtn = document.getElementById('floatClearBtn');
        const rewardBtn = document.getElementById('rewardBtn');
        const rewardModal = document.getElementById('rewardModal');

        // 赞赏弹窗
        rewardBtn.addEventListener('click', ()=>{
            rewardModal.classList.add('show');
        });
        rewardModal.addEventListener('click', (e)=>{
            if(e.target === rewardModal){
                rewardModal.classList.remove('show');
            }
        });

        // 浮动按钮拖动
        let isDragging = false;
        let offsetX, offsetY;
        floatClearBtn.addEventListener('mousedown', (e) => {
            isDragging = true;
            offsetX = e.clientX - floatClearBtn.getBoundingClientRect().left;
            offsetY = e.clientY - floatClearBtn.getBoundingClientRect().bottom;
            floatClearBtn.style.cursor = 'grabbing';
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const x = e.clientX - offsetX;
            const y = e.clientY + offsetY;
            floatClearBtn.style.left = x + 'px';
            floatClearBtn.style.bottom = window.innerHeight - y + 'px';
            floatClearBtn.style.right = 'auto';
        });
        document.addEventListener('mouseup', () => {
            isDragging = false;
            floatClearBtn.style.cursor = 'move';
        });
        floatClearBtn.addEventListener('click', clearAllFiles);

        // 拖拽上传
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });
        function highlight() {
            dropArea.classList.add('active');
        }
        function unhighlight() {
            dropArea.classList.remove('active');
        }
        dropArea.addEventListener('drop', handleDrop, false);
        async function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            await handleFiles(files);
        }

        async function handleFiles(files) {
            const startTime = performance.now();
            for (let file of files) {
                const ext = file.name.split('.').pop().toLowerCase();
                const allowTypes = ['pdf', 'docx', 'doc', 'ppt', 'pptx', 'txt', 'xls', 'xlsx'];
                if (!allowTypes.includes(ext)) continue;

                let pages = 0;
                try {
                    if (ext === 'pdf') {
                        const arrayBuffer = await readFileAsArrayBuffer(file);
                        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                        pages = pdfDoc.getPageCount();
                    } else {
                        pages = 1;
                    }
                } catch (err) {
                    pages = 0;
                }

                fileList.push({
                    name: file.name,
                    type: ext.toUpperCase(),
                    pages: pages,
                    id: Date.now() + Math.random()
                });
            }
            const endTime = performance.now();
            const cost = (endTime - startTime) / 1000;
            totalParseTime += cost;
            renderFileList();
            updateStats();
        }

        function readFileAsArrayBuffer(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsArrayBuffer(file);
            });
        }

        function renderFileList() {
            if (fileList.length === 0) {
                fileListContainer.innerHTML = '<div class="empty-state">暂无文件，请拖拽上传</div>';
                return;
            }
            fileListContainer.innerHTML = '';
            fileList.forEach(item => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <div class="file-name">${item.name}</div>
                    <div class="file-type">${item.type}</div>
                    <div class="file-pages">${item.pages}</div>
                    <button class="delete-btn" data-id="${item.id}">删除</button>
                `;
                fileListContainer.appendChild(div);
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    fileList = fileList.filter(item => item.id != id);
                    renderFileList();
                    updateStats();
                });
            });
        }

        function updateStats() {
            fileCountEl.textContent = fileList.length;
            const total = fileList.reduce((sum, item) => sum + item.pages, 0);
            totalPagesEl.textContent = total;
            parseTimeEl.textContent = totalParseTime.toFixed(2);
        }

        function clearAllFiles() {
            fileList = [];
            totalParseTime = 0;
            renderFileList();
            updateStats();
        }

        clearAllBtn.addEventListener('click', clearAllFiles);
        renderFileList();
    </script>
</body>
</html>
